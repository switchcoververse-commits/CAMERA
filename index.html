<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamoPro AI V28 - Full Auto</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: -apple-system, sans-serif; color: #fff; overflow-x: hidden; }
        
        /* Contenedores de Flujo */
        #camera-view, #gallery-view, #order-view { display: none; min-height: 100vh; width: 100vw; }
        #camera-view { display: flex; flex-direction: column; }

        /* Cámara (V23 base) */
        #viewport { position: relative; flex-grow: 1; margin: 10px; overflow: hidden; border-radius: 20px; display: flex; justify-content: center; align-items: center; background: #000; border: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #fixed-guide { position: absolute; width: 120px; height: 160px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 10px; }
        #dynamic-guide { position: absolute; width: 120px; height: 160px; border: 3px solid #ff4444; border-radius: 10px; transition: border-color 0.2s; }
        
        /* Galería de Validación */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; border: 2px solid #333; }
        .gallery-item.selected { border-color: #00ff00; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .check-badge { position: absolute; top: 10px; right: 10px; background: #00ff00; color: #000; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Formulario */
        .form-container { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        
        /* Botones */
        .footer-action { padding: 20px; background: #000; border-top: 1px solid #222; text-align: center; }
        .btn-main { background: #00ff00; color: #000; border: none; padding: 18px 0; width: 100%; border-radius: 35px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        
        #sensor-auth { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div id="sensor-auth">
    <h1 style="color: #00ff00; letter-spacing: 2px;">CAMOPRO AI</h1>
    <button class="btn-main" id="start-btn" style="max-width: 250px;">INITIALIZE SCANNER</button>
</div>

<div id="camera-view">
    <div id="viewport">
        <video id="video" autoplay playsinline muted></video>
        <div id="fixed-guide"></div>
        <div id="dynamic-guide"></div>
    </div>
    <div class="footer-action">
        <div id="capture-count" style="margin-bottom: 10px; font-size: 12px; color: #00ff00;">0 PHOTOS CAPTURED</div>
        <button id="go-to-gallery" class="btn-main" style="display: none;">REVIEW PHOTOS</button>
    </div>
</div>

<div id="gallery-view">
    <div style="padding: 25px 25px 0 25px;">
        <h2 style="color: #00ff00; margin: 0;">VALIDATE PHOTOS</h2>
        <p style="color: #888; font-size: 14px;">Tap to deselect photos you don't want to print.</p>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="footer-action">
        <button id="go-to-form" class="btn-main">CONTINUE TO SHIPPING</button>
    </div>
</div>

<div id="order-view">
    <div class="form-container">
        <h2 style="color: #00ff00;">SHIPPING</h2>
        <div class="form-group"><label>Full Name</label><input type="text" id="name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email"></div>
        <div class="form-group"><label>Shipping Address</label><input type="text" id="address"></div>
        
        <div style="background: #111; padding: 20px; border-radius: 15px; margin-top: 30px;">
            <div style="display: flex; justify-content: space-between;">
                <span>Total Items:</span><span id="final-count" style="color:#00ff00; font-weight:800;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 20px; font-weight: 900;">
                <span>TOTAL:</span><span id="final-price" style="color:#00ff00;">$0.00</span>
            </div>
        </div>
    </div>
    <div class="footer-action">
        <button class="btn-main" id="final-pay-btn">PAY & FINISH</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const dynamicGuide = document.getElementById('dynamic-guide');
    let capturedPhotos = [];
    let isLocked = false;
    let hasLeftZone = true;

    // --- CAMERA LOGIC ---
    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        document.getElementById('sensor-auth').style.display = 'none';
        document.getElementById('camera-view').style.display = 'flex';
    }

    function handleOrientation(event) {
        if (isLocked) return;
        const beta = event.beta;
        const gamma = event.gamma;
        let targetB = (beta > 45 && beta < 135) ? 90 : (beta <= 45 && beta >= -45) ? 0 : 180;
        
        const dV = Math.abs(beta - targetB);
        const dL = Math.abs(gamma);
        dynamicGuide.style.transform = `translate(${gamma * 5}px, ${(beta - targetB) * 5}px)`;

        if (dV < 4 && dL < 4) {
            if (hasLeftZone) {
                dynamicGuide.style.borderColor = "#00ff00";
                capture();
            }
        } else {
            hasLeftZone = true;
            dynamicGuide.style.borderColor = "#ff4444";
        }
    }

    function capture() {
        isLocked = true;
        hasLeftZone = false;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        capturedPhotos.push({ id: Date.now(), data: canvas.toDataURL('image/jpeg', 0.7), selected: true });
        
        document.getElementById('capture-count').innerText = `${capturedPhotos.length} PHOTOS CAPTURED`;
        document.getElementById('go-to-gallery').style.display = 'block';
        setTimeout(() => { isLocked = false; }, 1000);
    }

    // --- NAVIGATION & GALLERY ---
    document.getElementById('go-to-gallery').addEventListener('click', () => {
        document.getElementById('camera-view').style.display = 'none';
        document.getElementById('gallery-view').style.display = 'block';
        renderGallery();
    });

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        capturedPhotos.forEach(p => {
            const item = document.createElement('div');
            item.className = `gallery-item ${p.selected ? 'selected' : ''}`;
            item.innerHTML = `<img src="${p.data}">${p.selected ? '<div class="check-badge">✓</div>' : ''}`;
            item.onclick = () => {
                p.selected = !p.selected;
                renderGallery();
            };
            grid.appendChild(item);
        });
    }

    document.getElementById('go-to-form').addEventListener('click', () => {
        const finalOnes = capturedPhotos.filter(p => p.selected);
        if(finalOnes.length === 0) return alert("Select at least one photo");
        
        document.getElementById('gallery-view').style.display = 'none';
        document.getElementById('order-view').style.display = 'block';
        
        document.getElementById('final-count').innerText = finalOnes.length;
        document.getElementById('final-price').innerText = `$${(finalOnes.length * 45).toFixed(2)}`;
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(s => { 
                if(s==='granted') { window.addEventListener('deviceorientation', handleOrientation); initCamera(); } 
            });
        } else { window.addEventListener('deviceorientation', handleOrientation); initCamera(); }
    });

    document.getElementById('final-pay-btn').addEventListener('click', () => {
        alert("Automated Process: Sending Data & Redirecting to Stripe...");
        // Aquí se dispara el fetch() a tu webhook de Make.com o Stripe API
    });
</script>
</body>
</html>
