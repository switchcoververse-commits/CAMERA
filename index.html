<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamoPro AI V24</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; color: #fff; }
        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
        .header { padding: 15px; z-index: 10; background: rgba(0,0,0,0.8); text-align: center; border-bottom: 1px solid #222; }
        #thumbnail-bar { background: rgba(20, 20, 20, 0.6); margin: 5px 15px; border-radius: 12px; height: 70px; display: flex; align-items: center; padding: 5px; overflow-x: auto; gap: 8px; border: 1px solid #333; }
        .thumb-container { position: relative; min-width: 55px; height: 55px; }
        .thumb-img { width: 55px; height: 55px; object-fit: cover; border-radius: 6px; border: 1.5px solid #555; }
        .remove-thumb { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-weight: bold; font-size: 10px; }
        #viewport { position: relative; flex-grow: 1; margin: 10px 15px; overflow: hidden; border-radius: 15px; display: flex; justify-content: center; align-items: center; background: #000; border: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #fixed-guide { position: absolute; width: 110px; height: 150px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 8px; z-index: 5; }
        #dynamic-guide { position: absolute; width: 110px; height: 150px; border: 3px solid #ff4444; border-radius: 8px; z-index: 6; transition: border-color 0.2s; }
        #status-msg { position: absolute; top: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; z-index: 10; color: #ff4444; text-align: center; min-width: 160px; }
        .footer { padding-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
        #finish-btn { background: #00ff00; color: #000; border: none; padding: 14px 35px; border-radius: 25px; font-weight: 800; cursor: pointer; display: none; font-size: 13px; }
        #sensor-auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px; }
        #auth-btn { background: #fff; color: #000; padding: 18px 45px; border-radius: 35px; border: none; font-weight: bold; font-size: 16px; margin-top: 25px; width: 80%; }
        #toast { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 3000; display: none; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div id="toast">SCANNING...</div>

<div id="sensor-auth">
    <h2 style="color: #00ff00;">SMART OBJECT DETECTOR</h2>
    <p style="font-size: 14px; color: #ccc;">Align guides over the actual outlet.<br>The system will ignore empty surfaces.</p>
    <button id="auth-btn">ACTIVATE SCANNER</button>
</div>

<div id="camera-container">
    <div class="header"><span style="font-weight: 800; color: #00ff00;">CAMOPRO V24</span></div>
    <div id="thumbnail-bar"></div>
    <div id="viewport">
        <div id="status-msg">CENTER OUTLET</div>
        <video id="video" autoplay playsinline muted></video>
        <div id="fixed-guide"></div>
        <div id="dynamic-guide"></div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    <div class="footer"><button id="finish-btn">FINISH & PAY</button></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const thumbBar = document.getElementById('thumbnail-bar');
    const finishBtn = document.getElementById('finish-btn');
    const dynamicGuide = document.getElementById('dynamic-guide');
    const statusMsg = document.getElementById('status-msg');
    const authBtn = document.getElementById('auth-btn');
    const camContainer = document.getElementById('camera-container');
    const toast = document.getElementById('toast');
    
    let capturedPhotos = [];
    let isLocked = false;
    let hasLeftZone = true;

    function playShutter() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('sensor-auth').style.display = 'none';
                camContainer.style.visibility = 'visible';
            };
        } catch (err) { alert("Camera Error"); }
    }

    function handleOrientation(event) {
        if (isLocked) return;
        const beta = event.beta;
        const gamma = event.gamma;
        let targetBeta = (beta > 45 && beta < 135) ? 90 : (beta <= 45 && beta >= -45) ? 0 : 180;
        
        const diffV = Math.abs(beta - targetBeta);
        const diffL = Math.abs(gamma);

        dynamicGuide.style.transform = `translate(${gamma * 5}px, ${(beta - targetBeta) * 5}px)`;

        if (diffV < 4 && diffL < 4) {
            if (hasLeftZone) {
                dynamicGuide.style.borderColor = "#00ff00";
                statusMsg.innerText = "CHECKING OBJECT...";
                statusMsg.style.color = "#00ff00";
                validateScene();
            }
        } else {
            hasLeftZone = true;
            dynamicGuide.style.borderColor = "#ff4444";
            statusMsg.innerText = "ALIGN OVER OUTLET";
            statusMsg.style.color = "#ff4444";
        }
    }

    function validateScene() {
        isLocked = true;
        const ctx = canvas.getContext('2d');
        canvas.width = 300; // Small sample for speed
        canvas.height = 300;
        ctx.drawImage(video, (video.videoWidth/2)-150, (video.videoHeight/2)-150, 300, 300, 0, 0, 300, 300);
        
        const imgData = ctx.getImageData(0, 0, 300, 300).data;
        let diffs = 0;
        for (let i = 4; i < imgData.length; i += 4) {
            // Check brightness difference between adjacent pixels
            diffs += Math.abs(imgData[i] - imgData[i-4]); 
        }
        
        const entropy = diffs / (imgData.length / 4);

        // Entropy threshold: If too low, it's a flat wall. 
        // A wall is usually < 5. An outlet/object is usually > 15.
        if (entropy < 12) {
            statusMsg.innerText = "NO OBJECT DETECTED";
            statusMsg.style.color = "#ff4444";
            dynamicGuide.style.borderColor = "#ff4444";
            setTimeout(() => { isLocked = false; }, 500);
        } else {
            processCapture();
        }
    }

    function processCapture() {
        hasLeftZone = false;
        toast.innerText = "QUALITY VERIFIED ✓";
        toast.style.background = "#00ff00";
        toast.style.display = 'block';
        
        playShutter();
        
        // Full resolution capture
        const finalCtx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        finalCtx.drawImage(video, 0, 0);
        
        capturedPhotos.push({ id: Date.now(), data: canvas.toDataURL('image/jpeg', 0.8) });
        renderThumbnails();
        
        setTimeout(() => {
            toast.style.display = 'none';
            isLocked = false;
        }, 1500);
    }

    function renderThumbnails() {
        thumbBar.innerHTML = '';
        capturedPhotos.forEach(p => {
            const div = document.createElement('div');
            div.className = 'thumb-container';
            div.innerHTML = `<img src="${p.data}" class="thumb-img"><button class="remove-thumb" onclick="removePhoto(${p.id})">×</button>`;
            thumbBar.appendChild(div);
        });
        finishBtn.style.display = capturedPhotos.length > 0 ? 'block' : 'none';
        thumbBar.scrollLeft = thumbBar.scrollWidth;
    }

    window.removePhoto = (id) => {
        capturedPhotos = capturedPhotos.filter(p => p.id !== id);
        renderThumbnails();
    };

    authBtn.addEventListener('click', () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') { window.addEventListener('deviceorientation', handleOrientation); initCamera(); } });
        } else { window.addEventListener('deviceorientation', handleOrientation); initCamera(); }
    });

    finishBtn.addEventListener('click', () => alert("Proceeding to Order Form..."));
</script>
</body>
</html>
