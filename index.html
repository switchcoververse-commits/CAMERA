<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamoPro AI V26</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; color: #fff; }
        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
        .header { padding: 15px; z-index: 10; background: rgba(0,0,0,0.85); text-align: center; border-bottom: 1px solid #333; }
        #thumbnail-bar { background: rgba(25, 25, 25, 0.7); margin: 5px 15px; border-radius: 12px; height: 75px; display: flex; align-items: center; padding: 5px; overflow-x: auto; gap: 8px; border: 1px solid #444; }
        .thumb-container { position: relative; min-width: 60px; height: 60px; }
        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #555; }
        .remove-thumb { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-weight: bold; cursor: pointer; z-index: 20; }
        #viewport { position: relative; flex-grow: 1; margin: 10px 15px; overflow: hidden; border-radius: 20px; display: flex; justify-content: center; align-items: center; background: #000; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #fixed-guide { position: absolute; width: 130px; height: 170px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 10px; z-index: 5; }
        #dynamic-guide { position: absolute; width: 130px; height: 170px; border: 4px solid #ff4444; border-radius: 10px; z-index: 6; transition: border-color 0.2s, transform 0.1s ease-out; }
        #status-msg { position: absolute; top: 15px; background: rgba(0,0,0,0.85); padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; z-index: 10; color: #ff4444; text-align: center; }
        .footer { padding-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
        #finish-btn { background: #00ff00; color: #000; border: none; padding: 15px 45px; border-radius: 30px; font-weight: 900; cursor: pointer; display: none; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        #sensor-auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        #auth-btn { background: #fff; color: #000; padding: 20px 60px; border-radius: 40px; border: none; font-weight: 900; font-size: 18px; margin-top: 30px; width: 100%; max-width: 300px; }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 20px 35px; border-radius: 15px; font-weight: bold; z-index: 3000; display: none; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="toast">SCANNING...</div>

<div id="sensor-auth">
    <h2 style="color: #00ff00; letter-spacing: 2px;">CAMOPRO AI</h2>
    <p style="font-size: 15px; color: #aaa; line-height: 1.5;">Smart Detection Enabled.<br>Align boxes to capture your outlet.</p>
    <button id="auth-btn">START CAMERA</button>
</div>

<div id="camera-container">
    <div class="header"><span style="font-weight: 900; color: #00ff00; letter-spacing: 1px;">TEXTURE ANALYZER</span></div>
    <div id="thumbnail-bar"></div>
    <div id="viewport">
        <div id="status-msg">FINDING LEVEL...</div>
        <video id="video" autoplay playsinline muted></video>
        <div id="fixed-guide"></div>
        <div id="dynamic-guide"></div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    <div class="footer">
        <button id="finish-btn">COMPLETE ORDER</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const thumbBar = document.getElementById('thumbnail-bar');
    const finishBtn = document.getElementById('finish-btn');
    const dynamicGuide = document.getElementById('dynamic-guide');
    const statusMsg = document.getElementById('status-msg');
    const authBtn = document.getElementById('auth-btn');
    const camContainer = document.getElementById('camera-container');
    const toast = document.getElementById('toast');
    
    let capturedPhotos = [];
    let isLocked = false;
    let hasLeftZone = true;
    let greenStartTime = null;

    function playShutter() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('sensor-auth').style.display = 'none';
                camContainer.style.visibility = 'visible';
            };
        } catch (err) { alert("Please allow camera access."); }
    }

    function handleOrientation(event) {
        if (isLocked) return;

        let beta = event.beta;
        let gamma = event.gamma;
        let targetB = 0;
        let mode = "FLOOR";

        if (Math.abs(beta - 90) < 45) { targetB = 90; mode = "WALL"; }
        else if (Math.abs(beta) < 45) { targetB = 0; mode = "FLOOR"; }
        else { targetB = beta > 0 ? 180 : -180; mode = "CEILING"; }

        const diffV = Math.abs(beta - targetB);
        const diffL = Math.abs(gamma);

        dynamicGuide.style.transform = `translate(${gamma * 4}px, ${(beta - targetB) * 4}px)`;

        // Green Zone Logic
        if (diffV < 6 && diffL < 6) {
            if (hasLeftZone) {
                dynamicGuide.style.borderColor = "#00ff00";
                statusMsg.innerText = "ALIGNED! ANALYZING...";
                statusMsg.style.color = "#00ff00";
                
                if (!greenStartTime) greenStartTime = Date.now();
                
                // If it's green for more than 0.5s, try to capture
                if (Date.now() - greenStartTime > 500) {
                    validateAndCapture();
                }
            }
        } else {
            hasLeftZone = true;
            greenStartTime = null;
            dynamicGuide.style.borderColor = "#ff4444";
            statusMsg.innerText = `ALIGN FOR ${mode}`;
            statusMsg.style.color = "#ff4444";
        }
    }

    function validateAndCapture() {
        isLocked = true;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = 150; canvas.height = 150;
        
        // Sample center of video
        ctx.drawImage(video, (video.videoWidth/2)-75, (video.videoHeight/2)-75, 150, 150, 0, 0, 150, 150);
        const imgData = ctx.getImageData(0, 0, 150, 150).data;
        
        let diffSum = 0;
        for(let i=4; i < imgData.length; i+=12) { // Faster sampling
            diffSum += Math.abs(imgData[i] - imgData[i-4]);
        }
        
        const entropy = diffSum / (imgData.length / 12);

        // LOWERED THRESHOLD: 4 (previously 12). Much easier to trigger.
        if (entropy < 4) {
            statusMsg.innerText = "NO OUTLET DETECTED";
            statusMsg.style.color = "#ff4444";
            setTimeout(() => { isLocked = false; greenStartTime = null; }, 1000);
        } else {
            executeCapture();
        }
    }

    function executeCapture() {
        hasLeftZone = false;
        greenStartTime = null;
        playShutter();
        
        const finalCtx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        finalCtx.drawImage(video, 0, 0);
        
        capturedPhotos.push({ id: Date.now(), data: canvas.toDataURL('image/jpeg', 0.8) });
        renderThumbnails();
        
        toast.innerText = "OUTLET CAPTURED ✓";
        toast.style.display = 'block';
        setTimeout(() => { 
            toast.style.display = 'none'; 
            isLocked = false; 
        }, 1500);
    }

    function renderThumbnails() {
        thumbBar.innerHTML = '';
        capturedPhotos.forEach(p => {
            const div = document.createElement('div');
            div.className = 'thumb-container';
            div.innerHTML = `<img src="${p.data}" class="thumb-img"><button class="remove-thumb" onclick="removePhoto(${p.id})">×</button>`;
            thumbBar.appendChild(div);
        });
        finishBtn.style.display = capturedPhotos.length > 0 ? 'block' : 'none';
        thumbBar.scrollLeft = thumbBar.scrollWidth;
    }

    window.removePhoto = (id) => {
        capturedPhotos = capturedPhotos.filter(p => p.id !== id);
        renderThumbnails();
    };

    authBtn.addEventListener('click', () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(s => { 
                if(s==='granted') { window.addEventListener('deviceorientation', handleOrientation); initCamera(); } 
            });
        } else { window.addEventListener('deviceorientation', handleOrientation); initCamera(); }
    });

    finishBtn.addEventListener('click', () => alert("Proceeding to final order details..."));
</script>
</body>
</html>
